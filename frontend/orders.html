<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - Track Shipments & Invoices | Florish</title>
  
  <meta name="description" content="View and track status of outstanding deliveries, access order invoices, and review previous handcrafted floral purchases at Florish.">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .orders-wrapper {
      padding: var(--space-xxl) 0;
    }
    .order-row-card {
      background-color: var(--surface-color);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-row-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .order-status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
    }
    @media (max-width: 768px) {
      .order-row-card {
        flex-direction: column;
        align-items: flex-start;
        gap: var(--space-md);
      }
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div id="header-placeholder"></div>

  <main class="container orders-wrapper">
    <div id="orders-list-container">
      <div class="text-center" style="padding: 4rem 0;">
        <div style="display: inline-block; width: 35px; height: 35px;" class="spinner"></div>
        <p class="text-secondary" style="margin-top: 1rem;">Loading your order history...</p>
      </div>
    </div>
  </main>

  <!-- Visual Tracking & Invoice Modal Overlay -->
  <div id="tracking-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99999; align-items: center; justify-content: center; padding: 1rem;">
    <div class="modal-content" style="background: var(--surface-color); padding: var(--space-xl); border-radius: var(--radius-md); border: 1px solid var(--border-color); max-width: 600px; width: 100%; box-shadow: var(--shadow-lg); position: relative; max-height: 85vh; overflow-y: auto;">
      <button onclick="closeTrackingModal()" style="position: absolute; top: var(--space-md); right: var(--space-md); font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);">&times;</button>
      <div id="modal-body-content">
        <!-- Dynamically written by orders.js -->
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/darkmode.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/header.html')
        .then(res => res.text())
        .then(html => {
          const banner = document.getElementById('header-placeholder');
          banner.innerHTML = html;
          banner.querySelector('#page-title').textContent = 'My Order History';
          banner.querySelector('#breadcrumb-current').textContent = 'Orders';
        });
    });
  </script>
</body>
</html>
