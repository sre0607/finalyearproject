<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Get in Touch with Florish Team</title>
  
  <meta name="description" content="Have questions about customizable bridal setups or wholesale accounts? Get in touch with our floral consultants via our online form, email, or telephone.">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: var(--space-xxl);
      padding: var(--space-xxl) 0;
    }
    .contact-details {
      background-color: var(--primary-light);
      padding: var(--space-xxl) var(--space-xl);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }
    .contact-info-item {
      display: flex;
      gap: var(--space-md);
    }
    .contact-info-icon {
      font-size: 1.5rem;
      color: var(--primary);
    }
    @media (max-width: 768px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div id="header-placeholder"></div>

  <main class="container">
    <div class="contact-container">
      
      <!-- Left Column: Quick Shop Address details -->
      <section class="contact-details">
        <h2 style="font-family: var(--font-primary); font-size: 1.6rem; color: var(--primary);">Get in Touch</h2>
        <p class="text-secondary">Have queries regarding shipping timelines or personalized party designs? We are here to help!</p>
        
        <div class="contact-info-item">
          <span class="contact-info-icon">📍</span>
          <div>
            <strong>Address</strong>
            <p class="text-secondary">101 Floral Meadows Avenue, Garden City, GC 40029</p>
          </div>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-icon">📞</span>
          <div>
            <strong>Phone Support</strong>
            <p class="text-secondary">+1 (555) 392-4820</p>
          </div>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-icon">✉️</span>
          <div>
            <strong>Email Support</strong>
            <p class="text-secondary">hello@florish-shop.com</p>
          </div>
        </div>
      </section>

      <!-- Right Column: Interactive customer contact form -->
      <section class="contact-form-wrapper">
        <form id="contact-form" onsubmit="event.preventDefault(); if (typeof showNotification === 'function') { showNotification('Message successfully sent!', 'success'); } else { alert('Message successfully sent!'); } this.reset();">
          <div class="form-group">
            <label class="form-label" for="contact-name">Your Full Name</label>
            <input type="text" id="contact-name" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-email">Email Address</label>
            <input type="email" id="contact-email" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-subject">Subject</label>
            <input type="text" id="contact-subject" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-message">Message Details</label>
            <textarea id="contact-message" class="form-control" rows="5" placeholder="Write your message here..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </section>
      
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/darkmode.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/header.html')
        .then(res => res.text())
        .then(html => {
          const banner = document.getElementById('header-placeholder');
          banner.innerHTML = html;
          banner.querySelector('#page-title').textContent = 'Contact Our Team';
          banner.querySelector('#breadcrumb-current').textContent = 'Contact';
        });
    });
  </script>
</body>
</html>
