<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Shopping Cart - Review Selected Flowers | Florish</title>
  
  <meta name="description" content="View items in your shopping cart, modify purchase volumes, enter custom coupon discount codes, and proceed to checkout securely.">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div id="header-placeholder"></div>

  <main class="container">
    <div class="cart-container">
      
      <!-- Cart items table -->
      <section class="cart-table-wrapper">
        <table class="cart-table">
          <thead>
            <tr>
              <th>Product Details</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="cart-items-body">
            <!-- Dynamic listing generated by js/cart.js -->
            <tr class="empty-cart-row">
              <td colspan="5" class="text-center" style="padding: 3rem;">
                <p class="text-secondary" style="margin-bottom: var(--space-md);">Your shopping cart is currently empty!</p>
                <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
              </td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- Cart Side Panel Summary Calculation Box -->
      <aside class="summary-box">
        <h3 class="summary-title">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="lbl-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Estimated Shipping</span>
          <span id="lbl-shipping">₹0</span>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <span id="lbl-tax">₹0</span>
        </div>

        <div class="coupon-section" style="display: flex; gap: 0.5rem; width: 100%;">
          <input type="text" id="coupon-input" class="form-control" placeholder="Promo Code" style="flex: 1; margin-bottom: 0;" />
          <button class="btn btn-outline" id="btn-apply-coupon" style="padding: 0.5rem 1rem; margin-top: 0;">Apply</button>
          <button class="btn btn-outline" id="btn-remove-coupon" style="padding: 0.5rem 1rem; margin-top: 0; color: var(--error); border-color: var(--error); display: none;">Remove</button>
        </div>

        <div class="summary-row total">
          <span>Estimated Total</span>
          <span id="lbl-total">₹0</span>
        </div>

        <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: var(--space-md);">Proceed to Checkout</a>
      </aside>
      
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/darkmode.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/header.html')
        .then(res => res.text())
        .then(html => {
          const banner = document.getElementById('header-placeholder');
          banner.innerHTML = html;
          banner.querySelector('#page-title').textContent = 'Your Shopping Cart';
          banner.querySelector('#breadcrumb-current').textContent = 'Cart';
        });
    });
  </script>
</body>
</html>
