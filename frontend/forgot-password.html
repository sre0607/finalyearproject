<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Florish</title>
  
  <meta name="description" content="Request a password reset link for your Florish customer profile.">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">🌱 Florish</a>
      <p class="auth-subtitle">Forgot Password</p>
      <p class="text-secondary" style="font-size: 0.85rem; text-align: center; margin-bottom: var(--space-md);">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      
      <form class="auth-form" id="forgot-password-form" novalidate>
        <!-- Placeholder for server dynamic alerts -->
        <div id="auth-alert" style="display: none;"></div>

        <div class="form-group">
          <label class="form-label" for="reset-email">Email Address</label>
          <input type="email" id="reset-email" class="form-control" placeholder="name@example.com" required />
          <div class="error-msg" id="err-reset-email" style="display: none;"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-sm);">
          Send Reset Link
        </button>
      </form>

      <div class="auth-footer">
        Back to <a href="login.html">Sign In</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/darkmode.js"></script>
  <script>
    const form = document.getElementById('forgot-password-form');
    const emailInput = document.getElementById('reset-email');
    const submitBtn = form.querySelector('button[type="submit"]');
    const alertBox = document.getElementById('auth-alert');

    const validateForm = () => {
      const emailVal = emailInput.value.trim();
      const isValid = emailVal && validateEmailPattern(emailVal);
      if (submitBtn) submitBtn.disabled = !isValid;
    };

    const validateField = () => {
      const val = emailInput.value.trim();
      if (!val) {
        showInlineError(emailInput, 'Email address is required.');
      } else if (!validateEmailPattern(val)) {
        showInlineError(emailInput, 'Please enter a valid email address.');
      } else {
        clearInlineError(emailInput);
      }
    };

    emailInput.addEventListener('blur', validateField);
    emailInput.addEventListener('input', validateForm);
    emailInput.addEventListener('change', () => {
      validateField();
      validateForm();
    });

    validateForm();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (alertBox) {
        alertBox.style.display = 'none';
        alertBox.textContent = '';
      }

      const emailVal = emailInput.value.trim().toLowerCase();
      if (!emailVal) {
        if (typeof showInlineError === 'function') {
          showInlineError(emailInput, 'Email address is required.');
        } else {
          alert('Email address is required.');
        }
        return;
      }

      if (typeof validateEmailPattern === 'function' && !validateEmailPattern(emailVal)) {
        if (typeof showInlineError === 'function') {
          showInlineError(emailInput, 'Please enter a valid email address.');
        } else {
          alert('Please enter a valid email address.');
        }
        return;
      }

      const originalBtnText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await api.post('/auth/forgotpassword', { email: emailVal });
        
        if (alertBox) {
          alertBox.className = 'form-alert form-alert-success';
          alertBox.textContent = response.message || 'Password reset link sent to your email.';
          alertBox.style.display = 'flex';
        }
        emailInput.value = '';
      } catch (err) {
        if (alertBox) {
          alertBox.className = 'form-alert form-alert-error';
          alertBox.textContent = err.message || 'An error occurred. Please try again.';
          alertBox.style.display = 'flex';
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
      }
    });
  </script>
</body>
</html>
