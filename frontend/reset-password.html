<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Florish</title>
  
  <meta name="description" content="Enter a new password for your Florish profile.">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">🌱 Florish</a>
      <p class="auth-subtitle">Reset Password</p>
      
      <form class="auth-form" id="reset-password-form" novalidate>
        <!-- Placeholder for server dynamic alerts -->
        <div id="auth-alert" style="display: none;"></div>

        <div class="form-group">
          <label class="form-label" for="reset-password">New Password</label>
          <input type="password" id="reset-password" class="form-control" placeholder="••••••••" required />
          <div class="error-msg" id="err-reset-password" style="display: none;"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required />
          <div class="error-msg" id="err-confirm-password" style="display: none;"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-sm);">
          Update Password
        </button>
      </form>

      <div class="auth-footer">
        Back to <a href="login.html">Sign In</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/darkmode.js"></script>
  <script>
    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const alertBox = document.getElementById('auth-alert');
    if (!token) {
      if (alertBox) {
        alertBox.className = 'form-alert form-alert-error';
        alertBox.textContent = 'Invalid or missing password reset token. Please check your email link or request a new reset link.';
        alertBox.style.display = 'flex';
      }
      document.getElementById('reset-password-form').querySelector('button').disabled = true;
    }

    const form = document.getElementById('reset-password-form');
    const passwordInput = document.getElementById('reset-password');
    const confirmInput = document.getElementById('confirm-password');
    const submitBtn = form.querySelector('button[type="submit"]');

    const validateForm = () => {
      const passwordVal = passwordInput.value;
      const confirmVal = confirmInput.value;
      const isValid = passwordVal && validatePasswordStrengthPattern(passwordVal) && (passwordVal === confirmVal);
      if (submitBtn && token) submitBtn.disabled = !isValid;
    };

    const validateField = (inputEl) => {
      if (!inputEl) return;
      const val = inputEl.value;

      if (inputEl === passwordInput) {
        if (!val) {
          showInlineError(passwordInput, 'New password is required.');
        } else if (!validatePasswordStrengthPattern(val)) {
          showInlineError(passwordInput, 'Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number, and one special character.');
        } else {
          clearInlineError(passwordInput);
        }
      } else if (inputEl === confirmInput) {
        if (!val) {
          showInlineError(confirmInput, 'Please confirm your new password.');
        } else if (val !== passwordInput.value) {
          showInlineError(confirmInput, 'Passwords do not match.');
        } else {
          clearInlineError(confirmInput);
        }
      }
    };

    [passwordInput, confirmInput].forEach(input => {
      if (!input) return;
      input.addEventListener('blur', () => validateField(input));
      input.addEventListener('input', validateForm);
      input.addEventListener('change', () => {
        validateField(input);
        validateForm();
      });
    });

    validateForm();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (alertBox) {
        alertBox.style.display = 'none';
        alertBox.textContent = '';
      }

      let isValid = true;
      const passwordVal = passwordInput.value;
      const confirmVal = confirmInput.value;

      if (!passwordVal) {
        if (typeof showInlineError === 'function') {
          showInlineError(passwordInput, 'New password is required.');
        } else {
          alert('New password is required.');
        }
        isValid = false;
      } else if (typeof validatePasswordStrengthPattern === 'function' && !validatePasswordStrengthPattern(passwordVal)) {
        if (typeof showInlineError === 'function') {
          showInlineError(passwordInput, 'Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number, and one special character.');
        } else {
          alert('Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number, and one special character.');
        }
        isValid = false;
      }

      if (!confirmVal) {
        if (typeof showInlineError === 'function') {
          showInlineError(confirmInput, 'Please confirm your new password.');
        } else {
          alert('Please confirm your new password.');
        }
        isValid = false;
      } else if (passwordVal !== confirmVal) {
        if (typeof showInlineError === 'function') {
          showInlineError(confirmInput, 'Passwords do not match.');
        } else {
          alert('Passwords do not match.');
        }
        isValid = false;
      }

      if (!isValid) return;

      const originalBtnText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        const response = await api.post(`/auth/resetpassword/${token}`, { password: passwordVal });
        
        if (alertBox) {
          alertBox.className = 'form-alert form-alert-success';
          alertBox.textContent = response.message || 'Password successfully updated!';
          alertBox.style.display = 'flex';
        }
        passwordInput.value = '';
        confirmInput.value = '';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        if (alertBox) {
          alertBox.className = 'form-alert form-alert-error';
          alertBox.textContent = err.message || 'Failed to reset password. The link may have expired.';
          alertBox.style.display = 'flex';
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
      }
    });
  </script>
</body>
</html>
