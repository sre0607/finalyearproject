<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - Florish Backoffice</title>
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/darkmode.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/darkmode.js"></script>
  <style>
    /* Prevent layout flash before backend authorization check completes */
    html, body { display: none; }
  </style>
  <script>
    (async function() {
      const token = localStorage.getItem('florish_token');
      let user = null;
      try { user = JSON.parse(localStorage.getItem('florish_user')); } catch(e) {}
      
      if (!token || !user || user.role !== 'admin') {
        window.location.replace('login.html');
        return;
      }
      
      // Determine API URL (same logic as api.js)
      const hostname = window.location.hostname;
      const apiBase = (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '' || hostname.startsWith('192.168.') || hostname.startsWith('10.') || hostname.startsWith('172.16.') || hostname.endsWith('.local') || hostname.includes('localhost'))
        ? 'http://localhost:5000/api'
        : 'https://finalyearproject-qn8h.onrender.com/api';
      
      try {
        const response = await fetch(`${apiBase}/auth/profile`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (response.ok) {
          const profile = await response.json();
          if (profile && profile.role === 'admin') {
            // Keep local storage info updated
            localStorage.setItem('florish_user', JSON.stringify({ name: profile.name, email: profile.email, role: profile.role }));
            // Success - show page
            document.documentElement.style.display = 'block';
            if (document.body) document.body.style.display = 'block';
            return;
          }
        }
      } catch (err) {
        console.error('Admin session validation failed:', err);
      }
      
      // Redirect if unauthorized or fetch failed
      localStorage.removeItem('florish_token');
      localStorage.removeItem('florish_user');
      window.location.replace('login.html');
    })();
  </script>
</head>
<body>

  <div class="admin-layout">
    
    <!-- Sidebar Navigation Drawer -->
    <aside class="admin-sidebar">
      <div class="admin-logo">🌱 Florish Admin</div>
      <nav class="admin-menu">
        <a href="dashboard.html" class="admin-menu-link">📊 Dashboard</a>
        <a href="products.html" class="admin-menu-link">🌸 Inventory Items</a>
        <a href="add-product.html" class="admin-menu-link">➕ Add Product</a>
        <a href="orders.html" class="admin-menu-link">🛒 Client Orders</a>
        <a href="users.html" class="admin-menu-link active">👥 User Accounts</a>
        <a href="settings.html" class="admin-menu-link">⚙️ Core Settings</a>
        <a href="../index.html" class="admin-menu-link" style="margin-top: 5rem;">🏠 Public Site</a>
      </nav>
    </aside>

    <!-- Main Content Workspace -->
    <main class="admin-content">
      <header class="admin-header" style="flex-wrap: wrap; gap: 1rem;">
        <h1>User Directory</h1>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <input type="text" id="user-search-input" class="form-control" placeholder="Search by name or email..." style="width: 250px; margin-bottom: 0;" />
          <button class="btn btn-primary btn-sm" id="btn-search-users" style="margin-top: 0; padding: 0.5rem 1rem; border-radius: var(--radius-md);">Search</button>
        </div>
      </header>

      <!-- Users Directory Table -->
      <section class="admin-card">
        <div class="admin-table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email Address</th>
                <th>Access Level</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Jane Doe</td>
                <td>jane@gmail.com</td>
                <td><span class="admin-badge" style="background-color: hsl(210, 16%, 90%); color: var(--text-secondary);">Customer</span></td>
                <td><span class="admin-badge badge-success">Active</span></td>
                <td>
                  <button class="btn btn-outline btn-sm" onclick="alert('Updating user role...')">Change Role</button>
                  <button class="btn btn-outline btn-sm" style="color: var(--error); border-color: var(--error);" onclick="confirm('Are you sure you want to block this user?')">Block</button>
                </td>
              </tr>
              <tr>
                <td>Administrator</td>
                <td>admin@florish.com</td>
                <td><span class="admin-badge" style="background-color: hsl(var(--primary-hue), 50%, 85%); color: var(--primary);">Admin</span></td>
                <td><span class="admin-badge badge-success">Active</span></td>
                <td>
                  <button class="btn btn-outline btn-sm" disabled style="opacity: 0.5;">System Lock</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    
  </div>

  <script src="../js/api.js"></script>
  <script src="admin.js"></script>
</body>
</html>
