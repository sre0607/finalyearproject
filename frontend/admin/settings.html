<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Settings - Florish Backoffice</title>
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/darkmode.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/darkmode.js"></script>
  <style>
    /* Prevent layout flash before backend authorization check completes */
    html, body { display: none; }
  </style>
  <script>
    (async function() {
      const token = localStorage.getItem('florish_token');
      let user = null;
      try { user = JSON.parse(localStorage.getItem('florish_user')); } catch(e) {}
      
      if (!token || !user || user.role !== 'admin') {
        window.location.replace('login.html');
        return;
      }
      
      // Determine API URL (same logic as api.js)
      const hostname = window.location.hostname;
      const apiBase = (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '' || hostname.startsWith('192.168.') || hostname.startsWith('10.') || hostname.startsWith('172.16.') || hostname.endsWith('.local') || hostname.includes('localhost'))
        ? 'http://localhost:5000/api'
        : 'http://localhost:5000/api'; // Stale Render URL removed, fallback to local backend
      
      try {
        const response = await fetch(`${apiBase}/auth/profile`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (response.ok) {
          const profile = await response.json();
          if (profile && profile.role === 'admin') {
            // Keep local storage info updated
            localStorage.setItem('florish_user', JSON.stringify({ name: profile.name, email: profile.email, role: profile.role }));
            // Success - show page
            document.documentElement.style.display = 'block';
            if (document.body) document.body.style.display = 'block';
            return;
          }
        }
      } catch (err) {
        console.error('Admin session validation failed:', err);
      }
      
      // Redirect if unauthorized or fetch failed
      localStorage.removeItem('florish_token');
      localStorage.removeItem('florish_user');
      window.location.replace('login.html');
    })();
  </script>
</head>
<body>

  <div class="admin-layout">
    
    <!-- Sidebar Navigation Drawer -->
    <aside class="admin-sidebar">
      <div class="admin-logo">🌱 Florish Admin</div>
      <nav class="admin-menu">
        <a href="dashboard.html" class="admin-menu-link">📊 Dashboard</a>
        <a href="products.html" class="admin-menu-link">🌸 Inventory Items</a>
        <a href="add-product.html" class="admin-menu-link">➕ Add Product</a>
        <a href="orders.html" class="admin-menu-link">🛒 Client Orders</a>
        <a href="users.html" class="admin-menu-link">👥 User Accounts</a>
        <a href="settings.html" class="admin-menu-link active">⚙️ Core Settings</a>
        <a href="../index.html" class="admin-menu-link" style="margin-top: 5rem;">🏠 Public Site</a>
      </nav>
    </aside>

    <!-- Main Content Workspace -->
    <main class="admin-content">
      <header class="admin-header">
        <h1>Store Configurations</h1>
      </header>

      <!-- Settings Configurations Fields -->
      <section class="admin-card">
        <form id="settings-form">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-lg);">
            
            <div class="form-group">
              <label class="form-label" for="settings-brand-name">Store Brand Name</label>
              <input type="text" id="settings-brand-name" class="form-control" value="Florish" required />
            </div>

            <div class="form-group">
              <label class="form-label" for="settings-email">Support Helpdesk Email</label>
              <input type="email" id="settings-email" class="form-control" value="hello@florish-shop.com" required />
            </div>

            <div class="form-group">
              <label class="form-label" for="settings-tax">Sales Tax Percentage (%)</label>
              <input type="number" step="0.01" id="settings-tax" class="form-control" value="8.0" required />
              <small class="text-secondary" style="font-size: 0.75rem;">Backend verified pricing calculations.</small>
            </div>

            <div class="form-group">
              <label class="form-label" for="settings-shipping">Standard Shipping Charges (₹)</label>
              <input type="number" step="0.01" id="settings-shipping" class="form-control" value="99" required />
              <small class="text-secondary" style="font-size: 0.75rem;">Backend verified pricing calculations.</small>
            </div>

            <div class="form-group" style="grid-column: span 2;">
              <label class="form-label" for="settings-pincodes">Delivery Pincodes Limits (Comma separated)</label>
              <input type="text" id="settings-pincodes" class="form-control" value="400001, 400002, 400003, 400029, 400032" required />
              <small class="text-secondary" style="font-size: 0.75rem;">Orders outside these pincodes will be blocked during checkout validation.</small>
            </div>

          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: var(--space-md);">Save Configurations</button>
        </form>
      </section>
    </main>
    
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/validation.js"></script>
  <script src="admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const brandInput = document.getElementById('settings-brand-name');
      const emailInput = document.getElementById('settings-email');
      const taxInput = document.getElementById('settings-tax');
      const shippingInput = document.getElementById('settings-shipping');
      const pincodeInput = document.getElementById('settings-pincodes');
      const form = document.getElementById('settings-form');
      const submitBtn = form ? form.querySelector('button[type="submit"]') : null;

      const validateSettingsForm = () => {
        let isValid = true;
        if (brandInput) {
          const val = brandInput.value.trim();
          if (!val) isValid = false;
        }
        if (emailInput) {
          const val = emailInput.value.trim();
          if (!val || !validateEmailPattern(val)) isValid = false;
        }
        if (taxInput) {
          const val = taxInput.value.trim();
          const tax = Number(val);
          if (!val || isNaN(tax) || tax < 0 || tax > 100) isValid = false;
        }
        if (shippingInput) {
          const val = shippingInput.value.trim();
          const shipping = Number(val);
          if (!val || isNaN(shipping) || shipping < 0) isValid = false;
        }
        if (pincodeInput) {
          const val = pincodeInput.value.trim();
          if (!val || !validateSettingsPincodes(val)) isValid = false;
        }
        if (submitBtn) submitBtn.disabled = !isValid;
      };

      const validateField = (inputEl) => {
        if (!inputEl) return;
        const val = inputEl.value.trim();
        if (inputEl === brandInput) {
          if (!val) {
            showInlineError(brandInput, 'Store brand name is required.');
          } else {
            clearInlineError(brandInput);
          }
        } else if (inputEl === emailInput) {
          if (!val) {
            showInlineError(emailInput, 'Support email is required.');
          } else if (!validateEmailPattern(val)) {
            showInlineError(emailInput, 'Please enter a valid email address.');
          } else {
            clearInlineError(emailInput);
          }
        } else if (inputEl === taxInput) {
          const t = Number(val);
          if (!val) {
            showInlineError(taxInput, 'Sales tax is required.');
          } else if (isNaN(t) || t < 0 || t > 100) {
            showInlineError(taxInput, 'Sales tax must be a number between 0 and 100.');
          } else {
            clearInlineError(taxInput);
          }
        } else if (inputEl === shippingInput) {
          const s = Number(val);
          if (!val) {
            showInlineError(shippingInput, 'Shipping charge is required.');
          } else if (isNaN(s) || s < 0) {
            showInlineError(shippingInput, 'Shipping charge must be a non-negative number.');
          } else {
            clearInlineError(shippingInput);
          }
        } else if (inputEl === pincodeInput) {
          if (!val) {
            showInlineError(pincodeInput, 'Delivery pincodes are required.');
          } else if (!validateSettingsPincodes(val)) {
            showInlineError(pincodeInput, 'Pincodes must be a comma-separated list of exactly 6-digit numbers.');
          } else {
            clearInlineError(pincodeInput);
          }
        }
      };

      const settingsInputs = [brandInput, emailInput, taxInput, shippingInput, pincodeInput];
      settingsInputs.forEach(input => {
        if (!input) return;
        input.addEventListener('blur', () => validateField(input));
        input.addEventListener('input', () => validateSettingsForm());
        input.addEventListener('change', () => {
          validateField(input);
          validateSettingsForm();
        });
      });

      // Load settings from backend API
      try {
        const settings = await api.get('/admin/settings');
        if (settings) {
          if (brandInput) brandInput.value = settings.brandName || '';
          if (emailInput) emailInput.value = settings.supportEmail || '';
          if (taxInput) taxInput.value = settings.salesTax !== undefined ? settings.salesTax : '';
          if (shippingInput) shippingInput.value = settings.shippingCharge !== undefined ? settings.shippingCharge : '';
          if (pincodeInput) pincodeInput.value = settings.allowedPincodes || '';
        }
      } catch (err) {
        console.error('Failed to fetch store configurations:', err);
        // Fallback to local storage
        if (brandInput) brandInput.value = localStorage.getItem('florish_brand_name') || 'Florish';
        if (emailInput) emailInput.value = localStorage.getItem('florish_support_email') || 'hello@florish-shop.com';
        if (taxInput) taxInput.value = localStorage.getItem('florish_sales_tax') || '8.0';
        if (shippingInput) shippingInput.value = localStorage.getItem('florish_shipping_charge') || '99';
        if (pincodeInput) pincodeInput.value = localStorage.getItem('florish_allowed_pincodes') || '400001, 400002, 400003, 400029, 400032';
      }

      validateSettingsForm();

      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const payload = {
            brandName: brandInput.value.trim(),
            supportEmail: emailInput.value.trim(),
            salesTax: parseFloat(taxInput.value),
            shippingCharge: parseFloat(shippingInput.value),
            allowedPincodes: pincodeInput.value.trim()
          };

          try {
            const updated = await api.put('/admin/settings', payload);
            if (updated) {
              // Update local cache
              localStorage.setItem('florish_brand_name', updated.brandName);
              localStorage.setItem('florish_support_email', updated.supportEmail);
              localStorage.setItem('florish_sales_tax', updated.salesTax);
              localStorage.setItem('florish_shipping_charge', updated.shippingCharge);
              localStorage.setItem('florish_allowed_pincodes', updated.allowedPincodes);

              if (typeof showNotification === 'function') {
                showNotification('Configurations successfully updated!', 'success');
              } else {
                alert('Configurations successfully updated!');
              }
            }
          } catch (err) {
            console.error('Failed to update configurations:', err);
            if (typeof showNotification === 'function') {
              showNotification(err.message || 'Failed to update configurations', 'error');
            } else {
              alert('Error updating configurations: ' + err.message);
            }
          }
        });
      }
    });
  </script>
</body>
</html>
